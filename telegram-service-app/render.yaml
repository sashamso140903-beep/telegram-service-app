services:
  - type: web
    name: telegram-service-app
    runtime: python
    plan: free
    rootDir: telegram-service-app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_MODE
        value: webhook
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: antiplagiat2026_bot
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: ADMIN_TELEGRAM_ID
        value: "8938368487"
      - key: WEB_APP_URL
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: data/app.sqlite3
      - key: ALLOW_DEV_USER
        value: "0"
